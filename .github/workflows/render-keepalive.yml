name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$RENDER_HEALTHCHECK_URL" ]; then
            echo "Missing RENDER_HEALTHCHECK_URL secret"
            exit 1
          fi

          curl -sS -m 30 -L "$RENDER_HEALTHCHECK_URL" > /tmp/health.json
          echo "Ping completed"
