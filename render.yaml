services:
  - type: web
    name: whatsapp-news-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_RECIPIENTS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: UPDATE_INTERVAL_MINUTES
        value: "15"
      - key: MAX_NEWS_ARTICLES
        value: "5"
      - key: TIMEZONE
        value: "Asia/Kolkata"
      - key: NEWS_CATEGORY
        value: "stock_market_impact"